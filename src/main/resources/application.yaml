server:
  port: ${PORT:8082}

spring:
  application:
    name: tournament-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tournament_db}
    username: ${SPRING_DATASOURCE_USERNAME:tbe_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tbe_pass}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:fnzrdgdf}
    ssl:
      enabled: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

player:
  service:
    url: ${PLAYER_SERVICE_URL:http://localhost:8081}
    token: ${SERVICE_TOKEN}