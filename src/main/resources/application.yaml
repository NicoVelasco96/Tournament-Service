server:
  port: 8082

spring:
  application:
    name: tournament-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tournament_db}
    username: ${SPRING_DATASOURCE_USERNAME:tbe_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tbe_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:fnzrdgdf}
    ssl:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html